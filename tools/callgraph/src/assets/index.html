<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zag Callgraph Explorer</title>
  <style>
    :root {
      --bg: #15171c;
      --bg-elev: #1d2027;
      --bg-elev-2: #262a33;
      --border: #2e333d;
      --fg: #d8dde6;
      --fg-dim: #8a93a3;
      --fg-bright: #ffffff;
      --accent: #4a9eff;
      --direct: #888888;
      --dispatch-x64: #4a9eff;
      --dispatch-aarch64: #3ec9c9;
      --vtable: #b06ef0;
      --indirect: #f06060;
      --leaf-userspace: #f0a050;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
        Arial, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    /* ---- Top bar ----------------------------------------------------- */
    #topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      padding: 10px 16px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }

    #topbar h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--fg-bright);
      text-transform: uppercase;
      margin-right: 8px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .field label {
      color: var(--fg-dim);
      font-size: 12px;
    }

    select, button, input[type="range"] {
      background: var(--bg-elev-2);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
      padding: 4px 8px;
      outline: none;
    }

    select:focus, button:focus {
      border-color: var(--accent);
    }

    select {
      min-width: 280px;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      background: #2f3540;
    }

    #depth_value {
      display: inline-block;
      width: 1.5em;
      text-align: center;
      color: var(--fg-bright);
      font-variant-numeric: tabular-nums;
    }

    /* ---- Body split -------------------------------------------------- */
    #body {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
    }

    #graph {
      flex: 1 1 auto;
      min-width: 0;
      background: var(--bg);
      position: relative;
    }

    /* Floating legend ---------------------------------------------- */
    #legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(29, 32, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--fg-dim);
      pointer-events: none;
      line-height: 1.6;
    }
    #legend .swatch {
      display: inline-block;
      width: 22px;
      height: 2px;
      margin-right: 6px;
      vertical-align: middle;
    }
    #legend .dashed {
      border-top: 2px dashed currentColor;
      height: 0;
    }

    /* ---- Side panel -------------------------------------------------- */
    #info {
      flex: 0 0 30%;
      max-width: 480px;
      min-width: 280px;
      background: var(--bg-elev);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: none;
    }

    #info.visible { display: block; }

    #info header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    #info h2 {
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--fg-bright);
    }

    #info .close {
      background: transparent;
      border: none;
      color: var(--fg-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 0 6px;
    }

    #info dl {
      margin: 0 0 14px 0;
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 4px 12px;
    }

    #info dt {
      color: var(--fg-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      align-self: start;
      padding-top: 2px;
    }

    #info dd {
      margin: 0;
      color: var(--fg);
      word-break: break-all;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
    }

    #info .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--bg-elev-2);
      color: var(--fg-bright);
      border: 1px solid var(--border);
    }

    #info pre.source {
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 0 0 4px 4px;
      padding: 0;
      margin: 0;
      overflow: auto;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.4;
      color: #e6e6e6;
    }

    .source_block {
      border: 1px solid var(--border);
      border-radius: 4px;
      max-height: 50vh;
      overflow-y: auto;
      background: #1e1e1e;
    }

    .source_header {
      background: var(--bg-elev-2);
      border-bottom: 1px solid var(--border);
      padding: 6px 8px;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 11px;
      color: var(--fg-dim);
      user-select: text;
      word-break: break-all;
    }

    .source_header .open_file {
      color: var(--accent);
      text-decoration: none;
      cursor: text;
      user-select: text;
    }

    .source_table {
      width: 100%;
      border-collapse: collapse;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.4;
    }

    .source_table td {
      padding: 0;
      vertical-align: top;
      white-space: pre;
    }

    .source_gutter {
      color: #6a6a6a;
      text-align: right;
      padding: 0 10px 0 8px;
      user-select: none;
      border-right: 1px solid #2e333d;
      min-width: 3em;
      background: #1a1a1a;
    }

    .source_code {
      padding: 0 10px;
      color: #e6e6e6;
    }

    .source_line.highlight .source_code,
    .source_line.highlight .source_gutter {
      background-color: rgba(255, 200, 0, 0.15);
    }

    .source_line.highlight .source_gutter {
      color: #d8a050;
    }

    .source_error {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-elev-2);
      color: var(--indirect, #f06060);
      font-size: 12px;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
    }

    #info .placeholder {
      color: var(--fg-dim);
      font-style: italic;
      font-size: 12px;
    }

    /* ---- Intra (call-tree) block ---------------------------------- */
    .intra_block {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #1e1e1e;
      max-height: 50vh;
      overflow-y: auto;
    }

    .intra_header {
      background: var(--bg-elev-2);
      border-bottom: 1px solid var(--border);
      padding: 6px 10px;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 11px;
      color: var(--fg-dim);
      letter-spacing: 0.05em;
    }

    .intra_body {
      padding: 8px 10px 10px 10px;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
      color: var(--fg);
    }

    .intra_body ul.atom_list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .intra_body li.atom_call {
      padding: 2px 0 2px 0;
      display: flex;
      gap: 10px;
      align-items: baseline;
      border-left: 2px solid transparent;
      padding-left: 6px;
    }

    .intra_body li.atom_call:hover {
      background: rgba(74, 158, 255, 0.06);
    }

    .intra_body .callee_name {
      color: var(--fg);
      cursor: pointer;
      flex: 1 1 auto;
      word-break: break-all;
    }

    .intra_body .callee_name.kind_direct          { color: #d8dde6; }
    .intra_body .callee_name.kind_dispatch_x64    { color: #4a9eff; }
    .intra_body .callee_name.kind_dispatch_aarch64{ color: #3ec9c9; }
    .intra_body .callee_name.kind_vtable          { color: #b06ef0; }
    .intra_body .callee_name.kind_indirect        { color: #f06060; font-style: italic; }
    .intra_body .callee_name.kind_leaf_userspace  { color: #f0a050; }

    .intra_body .callee_name.unresolved {
      color: #f06060;
      font-style: italic;
    }

    .intra_body .callee_loc {
      color: var(--fg-dim);
      font-size: 11px;
      flex: 0 0 auto;
    }

    .intra_body details.atom_branch {
      margin: 4px 0;
      border-left: 2px solid #3a4150;
      padding-left: 8px;
    }

    .intra_body details.atom_branch > summary {
      cursor: pointer;
      color: var(--fg-dim);
      list-style: none;
      padding: 2px 0;
    }

    .intra_body details.atom_branch > summary::-webkit-details-marker {
      display: none;
    }

    .intra_body details.atom_branch > summary::before {
      content: "▸ ";
      color: var(--fg-dim);
      font-size: 10px;
    }

    .intra_body details.atom_branch[open] > summary::before {
      content: "▾ ";
    }

    .intra_body details.atom_branch summary .branch_kw {
      color: var(--accent);
      font-weight: 600;
    }

    .intra_body details.atom_branch summary .branch_loc {
      color: var(--fg-dim);
      font-size: 11px;
      margin-left: 6px;
    }

    .intra_body .arm {
      margin: 4px 0 4px 8px;
      border-left: 1px dashed #3a4150;
      padding-left: 8px;
    }

    .intra_body .arm_label {
      color: #d8a050;
      font-size: 11px;
      margin: 4px 0 2px 0;
      letter-spacing: 0.02em;
    }

    .intra_body .intra_empty {
      color: var(--fg-dim);
      font-style: italic;
      padding: 4px 0;
    }

    @keyframes intra_flash {
      0%   { box-shadow: 0 0 0 0 rgba(255, 200, 0, 0.0); }
      30%  { box-shadow: 0 0 0 6px rgba(255, 200, 0, 0.5); }
      100% { box-shadow: 0 0 0 12px rgba(255, 200, 0, 0.0); }
    }

    .cy_flash {
      animation: intra_flash 0.6s ease-out;
    }

    /* ---- Unreachable badge ---------------------------------------- */
    .badge.unreachable {
      background: #3a1f23;
      border-color: #7a2a30;
      color: #ff9b8c;
    }

    /* ---- List panel (indirect calls / dead code) ------------------ */
    #list_panel {
      flex: 0 0 32%;
      max-width: 520px;
      min-width: 320px;
      background: var(--bg-elev);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: none;
    }

    #list_panel.visible { display: block; }

    #list_panel header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    #list_panel h2 {
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--fg-bright);
    }

    #list_panel .close {
      background: transparent;
      border: none;
      color: var(--fg-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 0 6px;
    }

    #list_panel .filter_row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    #list_panel input[type="text"] {
      flex: 1 1 auto;
      background: var(--bg-elev-2);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
      padding: 4px 8px;
      outline: none;
    }
    #list_panel input[type="text"]:focus { border-color: var(--accent); }

    #list_panel .summary {
      color: var(--fg-dim);
      font-size: 11px;
      margin-bottom: 8px;
    }

    .list_rows {
      list-style: none;
      margin: 0;
      padding: 0;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
    }

    .list_row {
      display: flex;
      gap: 8px;
      align-items: baseline;
      padding: 4px 6px;
      border-left: 2px solid transparent;
      cursor: pointer;
      border-radius: 3px;
    }
    .list_row:hover {
      background: rgba(74, 158, 255, 0.08);
      border-left-color: var(--accent);
    }

    .list_row .marker {
      flex: 0 0 auto;
      color: var(--indirect);
      font-weight: bold;
      width: 1em;
      text-align: center;
    }
    .list_row .marker.dead {
      color: var(--fg-dim);
    }

    .list_row .row_name {
      flex: 1 1 auto;
      color: var(--fg);
      word-break: break-all;
    }

    .list_row .row_loc {
      flex: 0 0 auto;
      color: var(--fg-dim);
      font-size: 11px;
    }

    .list_row .kind_tag {
      flex: 0 0 auto;
      color: var(--fg-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .list_empty {
      color: var(--fg-dim);
      font-style: italic;
      padding: 8px 4px;
    }

    /* ---- Mode toggle (Graph | Trace) -------------------------------- */
    .mode_toggle {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .mode_button {
      background: var(--bg-elev-2);
      color: var(--fg-dim);
      border: 0;
      padding: 4px 12px;
      cursor: pointer;
      font: inherit;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 11px;
    }
    .mode_button + .mode_button {
      border-left: 1px solid var(--border);
    }
    .mode_button.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .mode_button:hover:not(.active) {
      background: #2f3540;
      color: var(--fg);
    }

    /* ---- Trace breadcrumb ------------------------------------------- */
    #trace_breadcrumb {
      flex: 0 0 auto;
      padding: 6px 16px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
      color: var(--fg-dim);
      min-height: 26px;
      transition: background 0.18s ease;
    }
    #trace_breadcrumb.flash {
      background: rgba(240, 96, 96, 0.18);
    }
    #trace_breadcrumb .crumb {
      color: var(--accent);
      cursor: pointer;
    }
    #trace_breadcrumb .crumb:hover { text-decoration: underline; }
    #trace_breadcrumb .crumb.current {
      color: var(--fg-bright);
      font-weight: 600;
      cursor: default;
    }
    #trace_breadcrumb .crumb_sep {
      color: var(--fg-dim);
    }

    /* ---- Trace view ------------------------------------------------- */
    #trace_view {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      background: var(--bg);
      overflow: auto;
      padding: 14px;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
      color: var(--fg);
    }

    .trace_box {
      border: 1px solid #888;
      border-radius: 4px;
      padding: 6px 8px;
      margin: 4px 0;
      background: rgba(255, 255, 255, 0.012);
    }

    .trace_header {
      display: flex;
      gap: 10px;
      align-items: baseline;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .trace_title { color: var(--fg-bright); flex: 0 0 auto; }
    .trace_title.clickable { cursor: pointer; color: var(--accent); }
    .trace_title.clickable:hover { text-decoration: underline; }

    .trace_loc {
      color: var(--fg-dim);
      font-size: 11px;
      font-weight: 400;
      margin-left: auto;
    }

    .trace_body { margin-top: 6px; }

    .trace_empty {
      color: var(--fg-dim);
      font-style: italic;
      padding: 2px 0;
    }

    /* Per-edge-kind border colors mirror the Cytoscape palette. */
    .trace_box.kind_direct          { border-color: #888; }
    .trace_box.kind_dispatch_x64    { border-color: #4a9eff; }
    .trace_box.kind_dispatch_aarch64{ border-color: #3ec9c9; }
    .trace_box.kind_vtable          { border-color: #b06ef0; }
    .trace_box.kind_indirect        { border-color: #f06060; border-style: dashed; }
    .trace_box.kind_leaf_userspace  { border-color: #f0a050; border-style: dashed; }

    .trace_box.entry {
      border-color: #4a9eff;
      border-width: 2px;
      background: rgba(74, 158, 255, 0.06);
    }

    .trace_box.trace_indirect {
      border-color: #f06060;
      border-style: dashed;
      color: #f06060;
    }
    .trace_box.trace_indirect .trace_title { color: #f06060; font-style: italic; }

    .trace_box.trace_recursive {
      border-color: #d8a050;
    }
    .trace_box.trace_recursive .trace_title { color: #d8a050; }

    .trace_box.trace_library {
      border-color: #555;
      background: rgba(255, 255, 255, 0.02);
    }
    .trace_box.trace_library .trace_title { color: #888; font-style: italic; }

    .trace_box.trace_loop {
      border-color: #4caf75;
    }
    .trace_box.trace_loop > .trace_header > .trace_title { color: #4caf75; }

    .trace_box.trace_unknown { border-color: #555; color: var(--fg-dim); }

    /* Branch — title row + columns under it. */
    .trace_branch {
      border: 1px dashed #3a4150;
      border-radius: 4px;
      padding: 6px;
      margin: 4px 0;
    }
    .trace_branch_head {
      display: flex;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .trace_branch_kw {
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 11px;
    }
    .trace_branch_cols {
      display: grid;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .trace_arm {
      border-left: 2px solid #3a4150;
      padding: 0 6px 6px 6px;
      min-width: 0;
    }
    .trace_arm_label {
      color: #d8a050;
      font-size: 11px;
      padding: 2px 0 4px 0;
      letter-spacing: 0.02em;
      border-bottom: 1px dashed #3a4150;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .trace_arm_body { font-size: 12px; }

    /* ---- Status / overlays ------------------------------------------ */
    #status {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(29, 32, 39, 0.95);
      color: var(--fg);
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    #status.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <h1>Zag Callgraph</h1>

      <div class="field">
        <label for="entry_select">Entry point:</label>
        <select id="entry_select">
          <option value="">(loading)</option>
        </select>
      </div>

      <div class="field">
        <label for="depth_slider">Depth:</label>
        <input type="range" id="depth_slider" min="1" max="10" value="4" />
        <span id="depth_value">4</span>
      </div>

      <div class="field">
        <label><input type="checkbox" id="include_indirect" checked /> include indirect</label>
      </div>

      <div class="field">
        <label title="Hides functions in /usr/lib/zig/ and __zig_* / __ubsan_* / compiler_rt.* infrastructure. Your kernel code is never hidden."><input type="checkbox" id="hide_library" checked /> hide stdlib/compiler <span style="color: var(--fg-dim); cursor: help;">(?)</span></label>
      </div>

      <button id="fit_btn" type="button">fit to view</button>
      <button id="indirect_panel_btn" type="button">indirect calls</button>
      <button id="dead_panel_btn" type="button">dead code</button>

      <div class="mode_toggle" id="mode_toggle">
        <button class="mode_button active" data-mode="graph" type="button">Graph</button>
        <button class="mode_button" data-mode="trace" type="button">Trace</button>
      </div>
    </div>

    <div id="trace_breadcrumb" style="display: none;"></div>

    <div id="body">
      <div id="graph">
        <div id="status"></div>
        <div id="legend">
          <div><span class="swatch" style="background: #888888"></span>direct</div>
          <div><span class="swatch" style="background: #4a9eff"></span>dispatch_x64</div>
          <div><span class="swatch" style="background: #3ec9c9"></span>dispatch_aarch64</div>
          <div><span class="swatch" style="background: #b06ef0"></span>vtable</div>
          <div><span class="swatch dashed" style="color: #f06060"></span>indirect</div>
          <div><span class="swatch dashed" style="color: #f0a050"></span>leaf_userspace</div>
        </div>
      </div>

      <div id="trace_view" style="display: none;"></div>

      <aside id="info">
        <header>
          <h2 id="info_title">Selection</h2>
          <button class="close" id="info_close" type="button" aria-label="Close panel">&times;</button>
        </header>
        <dl id="info_meta"></dl>
        <div id="info_source_wrap" style="display: none;">
          <dt style="color: var(--fg-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;">Source</dt>
          <div class="source_block" id="info_source"></div>
        </div>
        <div class="source_error" id="info_source_error" style="display: none;"></div>
        <div class="intra_block" id="info_intra_wrap" style="display: none;">
          <div class="intra_header">CALL TREE</div>
          <div class="intra_body" id="info_intra"></div>
        </div>
      </aside>

      <aside id="list_panel">
        <header>
          <h2 id="list_title">List</h2>
          <button class="close" id="list_close" type="button" aria-label="Close panel">&times;</button>
        </header>
        <div class="filter_row">
          <input type="text" id="list_filter" placeholder="filter..." />
        </div>
        <div class="summary" id="list_summary"></div>
        <ul class="list_rows" id="list_rows"></ul>
      </aside>
    </div>
  </div>

  <!-- The Zig backend serves the JS at /static/...; for local preview with
       `python3 -m http.server` in the assets dir the same files live at the
       root. We probe HEAD /static/cytoscape.min.js once and pick whichever
       prefix returns 200, then inject the scripts in order:
         1) cytoscape.min.js (Graph mode dependency)
         2) trace.js         (defines window.traceMode before app.js binds it)
         3) app.js           (Graph + mode-toggle wiring) -->
  <script>
    (function () {
      function inject(prefix) {
        var s1 = document.createElement("script");
        s1.src = prefix + "cytoscape.min.js";
        s1.onload = function () {
          var s2 = document.createElement("script");
          s2.src = prefix + "trace.js";
          s2.onload = function () {
            var s3 = document.createElement("script");
            s3.src = prefix + "app.js";
            document.body.appendChild(s3);
          };
          document.body.appendChild(s2);
        };
        document.body.appendChild(s1);
      }
      var probe = new XMLHttpRequest();
      probe.open("HEAD", "/static/cytoscape.min.js", true);
      probe.onload = function () {
        inject(probe.status === 200 ? "/static/" : "");
      };
      probe.onerror = function () { inject(""); };
      probe.send();
    })();
  </script>
</body>
</html>
