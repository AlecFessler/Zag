<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zag Callgraph Explorer</title>
  <style>
    :root {
      --bg: #15171c;
      --bg-elev: #1d2027;
      --bg-elev-2: #262a33;
      --border: #2e333d;
      --fg: #d8dde6;
      --fg-dim: #8a93a3;
      --fg-bright: #ffffff;
      --accent: #4a9eff;
      --direct: #888888;
      --dispatch-x64: #4a9eff;
      --dispatch-aarch64: #3ec9c9;
      --vtable: #b06ef0;
      --indirect: #f06060;
      --leaf-userspace: #f0a050;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
        Arial, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    /* ---- Top bar ----------------------------------------------------- */
    #topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      padding: 10px 16px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }

    #topbar h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--fg-bright);
      text-transform: uppercase;
      margin-right: 8px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .field label {
      color: var(--fg-dim);
      font-size: 12px;
    }

    select, button, input[type="range"] {
      background: var(--bg-elev-2);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
      padding: 4px 8px;
      outline: none;
    }

    select:focus, button:focus {
      border-color: var(--accent);
    }

    select {
      min-width: 280px;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      background: #2f3540;
    }

    #depth_value {
      display: inline-block;
      width: 1.5em;
      text-align: center;
      color: var(--fg-bright);
      font-variant-numeric: tabular-nums;
    }

    /* ---- Body split -------------------------------------------------- */
    #body {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
    }

    #graph {
      flex: 1 1 auto;
      min-width: 0;
      background: var(--bg);
      position: relative;
    }

    /* Floating legend ---------------------------------------------- */
    #legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(29, 32, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--fg-dim);
      pointer-events: none;
      line-height: 1.6;
    }
    #legend .swatch {
      display: inline-block;
      width: 22px;
      height: 2px;
      margin-right: 6px;
      vertical-align: middle;
    }
    #legend .dashed {
      border-top: 2px dashed currentColor;
      height: 0;
    }

    /* ---- Side panel -------------------------------------------------- */
    #info {
      flex: 0 0 30%;
      max-width: 480px;
      min-width: 280px;
      background: var(--bg-elev);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: none;
    }

    #info.visible { display: block; }

    #info header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    #info h2 {
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--fg-bright);
    }

    #info .close {
      background: transparent;
      border: none;
      color: var(--fg-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 0 6px;
    }

    #info dl {
      margin: 0 0 14px 0;
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 4px 12px;
    }

    #info dt {
      color: var(--fg-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      align-self: start;
      padding-top: 2px;
    }

    #info dd {
      margin: 0;
      color: var(--fg);
      word-break: break-all;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
    }

    #info .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--bg-elev-2);
      color: var(--fg-bright);
      border: 1px solid var(--border);
    }

    #info pre.source {
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 0 0 4px 4px;
      padding: 0;
      margin: 0;
      overflow: auto;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.4;
      color: #e6e6e6;
    }

    .source_block {
      border: 1px solid var(--border);
      border-radius: 4px;
      max-height: 50vh;
      overflow-y: auto;
      background: #1e1e1e;
    }

    .source_header {
      background: var(--bg-elev-2);
      border-bottom: 1px solid var(--border);
      padding: 6px 8px;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 11px;
      color: var(--fg-dim);
      user-select: text;
      word-break: break-all;
    }

    .source_header .open_file {
      color: var(--accent);
      text-decoration: none;
      cursor: text;
      user-select: text;
    }

    .source_table {
      width: 100%;
      border-collapse: collapse;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.4;
    }

    .source_table td {
      padding: 0;
      vertical-align: top;
      white-space: pre;
    }

    .source_gutter {
      color: #6a6a6a;
      text-align: right;
      padding: 0 10px 0 8px;
      user-select: none;
      border-right: 1px solid #2e333d;
      min-width: 3em;
      background: #1a1a1a;
    }

    .source_code {
      padding: 0 10px;
      color: #e6e6e6;
    }

    .source_line.highlight .source_code,
    .source_line.highlight .source_gutter {
      background-color: rgba(255, 200, 0, 0.15);
    }

    .source_line.highlight .source_gutter {
      color: #d8a050;
    }

    .source_error {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-elev-2);
      color: var(--indirect, #f06060);
      font-size: 12px;
      font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
    }

    #info .placeholder {
      color: var(--fg-dim);
      font-style: italic;
      font-size: 12px;
    }

    /* ---- Status / overlays ------------------------------------------ */
    #status {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(29, 32, 39, 0.95);
      color: var(--fg);
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    #status.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <h1>Zag Callgraph</h1>

      <div class="field">
        <label for="entry_select">Entry point:</label>
        <select id="entry_select">
          <option value="">(loading)</option>
        </select>
      </div>

      <div class="field">
        <label for="depth_slider">Depth:</label>
        <input type="range" id="depth_slider" min="1" max="10" value="4" />
        <span id="depth_value">4</span>
      </div>

      <div class="field">
        <label><input type="checkbox" id="include_indirect" checked /> include indirect</label>
      </div>

      <button id="fit_btn" type="button">fit to view</button>
    </div>

    <div id="body">
      <div id="graph">
        <div id="status"></div>
        <div id="legend">
          <div><span class="swatch" style="background: #888888"></span>direct</div>
          <div><span class="swatch" style="background: #4a9eff"></span>dispatch_x64</div>
          <div><span class="swatch" style="background: #3ec9c9"></span>dispatch_aarch64</div>
          <div><span class="swatch" style="background: #b06ef0"></span>vtable</div>
          <div><span class="swatch dashed" style="color: #f06060"></span>indirect</div>
          <div><span class="swatch dashed" style="color: #f0a050"></span>leaf_userspace</div>
        </div>
      </div>

      <aside id="info">
        <header>
          <h2 id="info_title">Selection</h2>
          <button class="close" id="info_close" type="button" aria-label="Close panel">&times;</button>
        </header>
        <dl id="info_meta"></dl>
        <div id="info_source_wrap" style="display: none;">
          <dt style="color: var(--fg-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;">Source</dt>
          <div class="source_block" id="info_source"></div>
        </div>
        <div class="source_error" id="info_source_error" style="display: none;"></div>
      </aside>
    </div>
  </div>

  <!-- The Zig backend serves the JS at /static/...; for local preview with
       `python3 -m http.server` in the assets dir the same files live at the
       root. We probe HEAD /static/cytoscape.min.js once and pick whichever
       prefix returns 200, then inject the two scripts in order. -->
  <script>
    (function () {
      function inject(prefix) {
        var s1 = document.createElement("script");
        s1.src = prefix + "cytoscape.min.js";
        s1.onload = function () {
          var s2 = document.createElement("script");
          s2.src = prefix + "app.js";
          document.body.appendChild(s2);
        };
        document.body.appendChild(s1);
      }
      var probe = new XMLHttpRequest();
      probe.open("HEAD", "/static/cytoscape.min.js", true);
      probe.onload = function () {
        inject(probe.status === 200 ? "/static/" : "");
      };
      probe.onerror = function () { inject(""); };
      probe.send();
    })();
  </script>
</body>
</html>
