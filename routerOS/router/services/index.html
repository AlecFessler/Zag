<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zag RouterOS</title>
<style>
  :root {
    --bg: #111520;
    --surface: #1a1f2e;
    --border: #2a3045;
    --text: #c8ccd4;
    --dim: #6b7280;
    --green: #22c55e;
    --blue: #3b82f6;
    --red: #ef4444;
    --input-bg: #0f1218;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Consolas', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--green);
  }

  header h1 span { color: var(--dim); }

  #conn-status {
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 12px;
    background: #16a34a22;
    color: var(--green);
    border: 1px solid #16a34a44;
  }

  #conn-status.error {
    background: #ef444422;
    color: var(--red);
    border-color: #ef444444;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .card-header:hover { background: #ffffff06; }

  .card-header h2 {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .card-header .toggle {
    font-size: 0.75rem;
    color: var(--dim);
    transition: transform 0.2s;
  }

  .card-header.collapsed .toggle { transform: rotate(-90deg); }

  .card-body { padding: 12px 16px; }
  .card-header.collapsed + .card-body { display: none; }

  /* Interface boxes */
  .iface-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
  }

  .iface-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }

  .iface-box .name {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--blue);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .iface-box .row {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    padding: 2px 0;
  }

  .iface-box .row .key { color: var(--dim); }
  .iface-box .row .val { color: var(--green); font-weight: 500; }

  /* Stat items */
  .stat-row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
  }

  .stat-val {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--green);
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }

  th {
    text-align: left;
    color: var(--dim);
    font-weight: 500;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 8px 12px;
    border-bottom: 1px solid #ffffff08;
  }

  tr:hover td { background: #ffffff04; }

  td.empty {
    text-align: center;
    color: var(--dim);
    padding: 16px;
    font-style: italic;
  }

  /* Forms */
  .form-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 0 4px;
    flex-wrap: wrap;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  input, select {
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 0.8rem;
    border-radius: 4px;
    outline: none;
  }

  input:focus, select:focus { border-color: var(--blue); }
  input::placeholder { color: #4b5563; }

  button {
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
  }

  button:hover { opacity: 0.85; }

  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid #ef444444;
    padding: 4px 10px;
    font-size: 0.75rem;
  }

  .btn-danger:hover {
    background: var(--red);
    color: #fff;
  }

  .form-label {
    font-size: 0.75rem;
    color: var(--dim);
    white-space: nowrap;
  }

  /* DNS current */
  .dns-current { font-size: 0.85rem; margin-bottom: 4px; }
  .dns-current .val { color: var(--green); font-weight: 500; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 0.8rem;
    font-family: inherit;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  #toast.show { opacity: 1; }
  #toast.ok { background: #16a34a; color: #fff; }
  #toast.err { background: var(--red); color: #fff; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1><span>&gt;</span> Zag RouterOS</h1>
    <div id="conn-status">Connected</div>
  </header>

  <!-- Interfaces -->
  <div class="card">
    <div class="card-header" onclick="toggleCard(this)">
      <h2>Interfaces</h2><span class="toggle">&#9660;</span>
    </div>
    <div class="card-body">
      <div class="iface-grid">
        <div class="iface-box" id="wan-box"></div>
        <div class="iface-box" id="lan-box"></div>
      </div>
    </div>
  </div>

  <!-- Traffic -->
  <div class="card">
    <div class="card-header" onclick="toggleCard(this)">
      <h2>Traffic</h2><span class="toggle">&#9660;</span>
    </div>
    <div class="card-body"><div id="stats-body"></div></div>
  </div>

  <!-- DNS -->
  <div class="card">
    <div class="card-header" onclick="toggleCard(this)">
      <h2>DNS</h2><span class="toggle">&#9660;</span>
    </div>
    <div class="card-body">
      <div class="dns-current" id="dns-cur"></div>
      <div class="form-row">
        <span class="form-label">Upstream:</span>
        <input id="dns-ip" placeholder="8.8.8.8" size="15"
               onkeydown="if(event.key==='Enter')setDns()">
        <button onclick="setDns()">Set</button>
      </div>
    </div>
  </div>

  <!-- Firewall -->
  <div class="card">
    <div class="card-header" onclick="toggleCard(this)">
      <h2>Firewall Rules</h2><span class="toggle">&#9660;</span>
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th>Action</th><th>IP Address</th><th style="width:80px"></th></tr></thead>
        <tbody id="fw-body"></tbody>
      </table>
      <div class="form-row">
        <span class="form-label">Block IP:</span>
        <input id="block-ip" placeholder="1.2.3.4" size="15"
               onkeydown="if(event.key==='Enter')blockIp()">
        <button onclick="blockIp()">Block</button>
      </div>
    </div>
  </div>

  <!-- Port Forwards -->
  <div class="card">
    <div class="card-header" onclick="toggleCard(this)">
      <h2>Port Forwards</h2><span class="toggle">&#9660;</span>
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th>Proto</th><th>WAN Port</th><th>LAN Target</th><th style="width:80px"></th></tr></thead>
        <tbody id="fwd-body"></tbody>
      </table>
      <div class="form-row">
        <select id="fwd-proto">
          <option value="tcp">TCP</option>
          <option value="udp">UDP</option>
        </select>
        <input id="fwd-wp" placeholder="WAN port" size="6">
        <span class="form-label">&rarr;</span>
        <input id="fwd-lip" placeholder="LAN IP" size="13">
        <span class="form-label">:</span>
        <input id="fwd-lp" placeholder="port" size="6"
               onkeydown="if(event.key==='Enter')addFwd()">
        <button onclick="addFwd()">Add</button>
      </div>
    </div>
  </div>

  <!-- DHCP Leases -->
  <div class="card">
    <div class="card-header" onclick="toggleCard(this)">
      <h2>DHCP Leases</h2><span class="toggle">&#9660;</span>
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th>IP Address</th><th>MAC Address</th></tr></thead>
        <tbody id="lease-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ARP -->
  <div class="card">
    <div class="card-header collapsed" onclick="toggleCard(this)">
      <h2>ARP Table</h2><span class="toggle">&#9660;</span>
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th>Interface</th><th>IP Address</th><th>MAC Address</th></tr></thead>
        <tbody id="arp-body"></tbody>
      </table>
    </div>
  </div>

  <!-- NAT -->
  <div class="card">
    <div class="card-header collapsed" onclick="toggleCard(this)">
      <h2>NAT Table</h2><span class="toggle">&#9660;</span>
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th>Proto</th><th>LAN Source</th><th>WAN Port</th><th>Destination</th></tr></thead>
        <tbody id="nat-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function() {
  var $ = document.getElementById.bind(document);
  var toastTimer;

  // ── API helpers ────────────────────────────────

  function apiCall(method, url, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open(method, url);
    xhr.onload = function() {
      try {
        callback(null, JSON.parse(xhr.responseText));
      } catch(e) {
        callback('Bad response');
      }
    };
    xhr.onerror = function() { callback('Connection failed'); };
    xhr.send();
  }

  function get(url, cb) { apiCall('GET', url, cb); }
  function post(url, cb) { apiCall('POST', url, cb); }

  // ── Toast notifications ────────────────────────

  function toast(msg, isError) {
    var el = $('toast');
    el.textContent = msg;
    el.className = 'show ' + (isError ? 'err' : 'ok');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.className = ''; }, 2500);
  }

  // ── Mutation helper ────────────────────────────

  function mutate(url) {
    post(url, function(err, data) {
      if (err) return toast(err, true);
      if (!data.ok) return toast(data.error || 'Error', true);
      toast('Done');
      refresh();
    });
  }

  // ── Card collapse ──────────────────────────────

  window.toggleCard = function(header) {
    header.classList.toggle('collapsed');
  };

  // ── DOM helpers ────────────────────────────────

  function el(tag, className, text) {
    var e = document.createElement(tag);
    if (className) e.className = className;
    if (text !== undefined) e.textContent = text;
    return e;
  }

  function tableRow(cells) {
    var tr = el('tr');
    cells.forEach(function(cell) {
      var td = el('td');
      if (cell && cell.nodeType) td.appendChild(cell);
      else td.textContent = cell || '';
      tr.appendChild(td);
    });
    return tr;
  }

  function emptyRow(colspan, message) {
    var td = el('td', 'empty', message || 'No entries');
    td.colSpan = colspan;
    var tr = el('tr');
    tr.appendChild(td);
    return tr;
  }

  function removeButton(onclick) {
    var btn = el('button', 'btn-danger', 'Remove');
    btn.onclick = onclick;
    return btn;
  }

  // ── Interface box renderer ─────────────────────

  function renderIfaceBox(id, name, data) {
    var box = $(id);
    if (!data) { box.style.display = 'none'; return; }
    box.style.display = '';
    box.innerHTML = '';
    box.appendChild(el('div', 'name', name));
    var fields = [['IP Address', data.ip], ['MAC', data.mac]];
    if (data.gateway) fields.push(['Gateway', data.gateway]);
    fields.forEach(function(f) {
      var row = el('div', 'row');
      row.appendChild(el('span', 'key', f[0]));
      row.appendChild(el('span', 'val', f[1]));
      box.appendChild(row);
    });
  }

  // ── Stats renderer ────────────────────────────

  function renderStats(name, data) {
    var container = el('div');
    container.style.marginBottom = '12px';
    var label = el('div', '', name);
    label.style.cssText = 'font-size:.75rem;color:var(--dim);text-transform:uppercase;margin-bottom:6px';
    container.appendChild(label);
    var row = el('div', 'stat-row');
    [['rx', 'RX Pkts'], ['tx', 'TX Pkts'], ['drop', 'Dropped']].forEach(function(s) {
      var item = el('div', 'stat-item');
      item.appendChild(el('span', 'stat-val', String(data[s[0]])));
      item.appendChild(el('span', 'stat-label', s[1]));
      row.appendChild(item);
    });
    container.appendChild(row);
    return container;
  }

  // ── Main refresh ──────────────────────────────

  var connected = true;

  function refresh() {
    get('/api/status', function(err, d) {
      if (err) {
        if (connected) {
          $('conn-status').textContent = 'Disconnected';
          $('conn-status').className = 'error';
          connected = false;
        }
        return;
      }
      if (!connected) {
        $('conn-status').textContent = 'Connected';
        $('conn-status').className = '';
        connected = true;
      }
      renderIfaceBox('wan-box', 'WAN', d.wan);
      renderIfaceBox('lan-box', 'LAN', d.lan);
      if (d.dns) {
        $('dns-cur').innerHTML = '';
        $('dns-cur').appendChild(document.createTextNode('Current: '));
        var v = el('span', 'val', d.dns);
        $('dns-cur').appendChild(v);
      }
    });

    get('/api/ifstat', function(err, d) {
      if (err) return;
      var body = $('stats-body');
      body.innerHTML = '';
      if (d.wan) body.appendChild(renderStats('WAN', d.wan));
      if (d.lan) body.appendChild(renderStats('LAN', d.lan));
    });

    get('/api/arp', function(err, d) {
      if (err) return;
      var tb = $('arp-body');
      tb.innerHTML = '';
      if (!d.length) { tb.appendChild(emptyRow(3)); return; }
      d.forEach(function(e) {
        tb.appendChild(tableRow([e.iface, e.ip, e.mac]));
      });
    });

    get('/api/nat', function(err, d) {
      if (err) return;
      var tb = $('nat-body');
      tb.innerHTML = '';
      if (!d.length) { tb.appendChild(emptyRow(4)); return; }
      d.forEach(function(e) {
        tb.appendChild(tableRow([
          e.proto,
          e.lan_ip + ':' + e.lan_port,
          ':' + e.wan_port,
          e.dst_ip + ':' + e.dst_port
        ]));
      });
    });

    get('/api/leases', function(err, d) {
      if (err) return;
      var tb = $('lease-body');
      tb.innerHTML = '';
      if (!d.length) { tb.appendChild(emptyRow(2)); return; }
      d.forEach(function(e) {
        tb.appendChild(tableRow([e.ip, e.mac]));
      });
    });

    get('/api/rules', function(err, d) {
      if (err) return;

      // Firewall rules
      var fw = $('fw-body');
      fw.innerHTML = '';
      if (!d.firewall.length) {
        fw.appendChild(emptyRow(3, 'No rules'));
      } else {
        d.firewall.forEach(function(e) {
          fw.appendChild(tableRow([
            e.action, e.ip,
            removeButton(function() { mutate('/api/allow/' + e.ip); })
          ]));
        });
      }

      // Port forwards
      var fwd = $('fwd-body');
      fwd.innerHTML = '';
      if (!d.forwards.length) {
        fwd.appendChild(emptyRow(4, 'No forwards'));
      } else {
        d.forwards.forEach(function(e) {
          fwd.appendChild(tableRow([
            e.proto,
            ':' + e.wan_port,
            e.lan_ip + ':' + e.lan_port,
            removeButton(function() { mutate('/api/unforward/' + e.wan_port); })
          ]));
        });
      }
    });
  }

  // ── Action handlers ───────────────────────────

  window.blockIp = function() {
    var input = $('block-ip');
    var val = input.value.trim();
    if (!val) return;
    input.value = '';
    mutate('/api/block/' + val);
  };

  window.setDns = function() {
    var input = $('dns-ip');
    var val = input.value.trim();
    if (!val) return;
    input.value = '';
    mutate('/api/dns/' + val);
  };

  window.addFwd = function() {
    var proto = $('fwd-proto').value;
    var wp = $('fwd-wp').value.trim();
    var lip = $('fwd-lip').value.trim();
    var lp = $('fwd-lp').value.trim();
    if (!wp || !lip || !lp) return;
    $('fwd-wp').value = '';
    $('fwd-lp').value = '';
    mutate('/api/forward/' + proto + '/' + wp + '/' + lip + '/' + lp);
  };

  // ── Start ─────────────────────────────────────

  refresh();
  setInterval(refresh, 5000);
})();
</script>
</body>
</html>
