[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::pytest.PytestUnhandledThreadExceptionWarning
markers =
    lan: tests requiring LAN NIC initialization (currently not initialized)
    unimplemented: tests for features not yet implemented
    flaky: tests that pass in isolation but may fail in the full suite due to NFS state machine timing
